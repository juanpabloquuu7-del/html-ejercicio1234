<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  body {
    margin: 0;
    padding: 20px;
  }

  
  .barra {
    background-color: #d1b2d9; 
    display: flex;
    align-items: center;
    padding: 10px 0; 
    font-family: 'Times New Roman', Times, serif;
  }

  
  .nav-item {
    color: white;
    text-decoration: none;
    font-size: 20px;
    padding: 15px 25px;
    display: inline-block;
    cursor: pointer;
    background-color: transparent; 
    transition: background-color 0.2s; 
  }

  
  .nav-item:hover {
    background-color: #0000ff;
  }
</style>
</head>
<body>
    <nav class="barra">
    <a class="nav-item">Inicio</a>
    <a class="nav-item">¿Quienes Somos?</a>
    <a class="nav-item">Contacto</a>
  </nav>
</body>
</html>
